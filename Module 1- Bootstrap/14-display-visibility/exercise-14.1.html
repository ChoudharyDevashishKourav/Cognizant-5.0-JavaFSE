<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exercise 14.1</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body>
  <div class="container mt-4">
    <div class="d-none d-md-block p-3 bg-primary text-white rounded mb-3">
      Visible only on md and above (hidden on mobile)
    </div>
    <div class="d-block d-md-none p-3 bg-success text-white rounded mb-3">
      Visible only on mobile (hidden on md and above)
    </div>
    <div class="d-none d-lg-flex p-3 bg-warning rounded align-items-center gap-2">
      <span>Flex layout visible only on lg and above</span>
    </div>
  </div>
</body>
</html>
