<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exercise 7.1</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body>
  <div class="container mt-4">
    <h1 class="display-1">Display 1</h1>
    <h2 class="display-4">Display 4</h2>
    <p class="lead">This is a lead paragraph that stands out.</p>
    <p class="text-muted">This text is muted and less prominent.</p>
    <p class="fw-bold">This text is bold using fw-bold.</p>
    <p class="fw-light">This text is light using fw-light.</p>
    <p class="fst-italic">This text is italic using fst-italic.</p>
    <p><mark>Highlighted text using mark tag.</mark></p>
    <p class="small">Small text using .small class.</p>
  </div>
</body>
</html>
