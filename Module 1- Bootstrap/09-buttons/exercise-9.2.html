<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exercise 9.2</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body>
  <div class="container mt-4">
    <h5>Button Group</h5>
    <div class="btn-group mb-4">
      <button class="btn btn-primary">Left</button>
      <button class="btn btn-primary">Middle</button>
      <button class="btn btn-primary">Right</button>
    </div>

    <h5>Toggle Buttons (Checkbox)</h5>
    <div class="btn-group" role="group">
      <input type="checkbox" class="btn-check" id="opt1" autocomplete="off">
      <label class="btn btn-outline-primary" for="opt1">Bold</label>

      <input type="checkbox" class="btn-check" id="opt2" autocomplete="off">
      <label class="btn btn-outline-primary" for="opt2">Italic</label>

      <input type="checkbox" class="btn-check" id="opt3" autocomplete="off">
      <label class="btn btn-outline-primary" for="opt3">Underline</label>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
