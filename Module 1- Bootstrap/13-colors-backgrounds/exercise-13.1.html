<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exercise 13.1</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body>
  <div class="container mt-4">
    <h2>Dashboard</h2>
    <div class="row g-3">
      <div class="col-md-3">
        <div class="p-3 bg-primary text-white rounded">
          <h6>Users</h6><h3>1,240</h3>
        </div>
      </div>
      <div class="col-md-3">
        <div class="p-3 bg-success text-white rounded">
          <h6>Revenue</h6><h3>$8,430</h3>
        </div>
      </div>
      <div class="col-md-3">
        <div class="p-3 bg-warning rounded">
          <h6>Pending</h6><h3>34</h3>
        </div>
      </div>
      <div class="col-md-3">
        <div class="p-3 bg-danger text-white rounded">
          <h6>Errors</h6><h3>7</h3>
        </div>
      </div>
    </div>
    <div class="row g-3 mt-2">
      <div class="col-md-6">
        <div class="p-3 bg-info text-white rounded">Info Block</div>
      </div>
      <div class="col-md-6">
        <div class="p-3 bg-secondary text-white rounded">Secondary Block</div>
      </div>
    </div>
  </div>
</body>
</html>
