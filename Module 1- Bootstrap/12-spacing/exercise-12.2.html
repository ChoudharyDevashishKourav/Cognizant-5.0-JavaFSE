<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exercise 12.2</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body>
  <div class="container my-5">
    <h2 class="text-center mb-5">Pricing Plans</h2>
    <div class="row g-4 justify-content-center">
      <div class="col-md-4">
        <div class="card text-center p-4 shadow-sm">
          <h4 class="mb-3">Free</h4>
          <h2 class="mb-4">$0<small class="fs-6">/mo</small></h2>
          <p class="mb-4">Basic features for individuals.</p>
          <button class="btn btn-outline-primary mt-2">Get Started</button>
        </div>
      </div>
      <div class="col-md-4">
        <div class="card text-center p-4 shadow bg-primary text-white">
          <h4 class="mb-3">Pro</h4>
          <h2 class="mb-4">$19<small class="fs-6">/mo</small></h2>
          <p class="mb-4">Advanced features for teams.</p>
          <button class="btn btn-light mt-2">Get Started</button>
        </div>
      </div>
      <div class="col-md-4">
        <div class="card text-center p-4 shadow-sm">
          <h4 class="mb-3">Enterprise</h4>
          <h2 class="mb-4">$49<small class="fs-6">/mo</small></h2>
          <p class="mb-4">Full access for large orgs.</p>
          <button class="btn btn-outline-primary mt-2">Contact Us</button>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
